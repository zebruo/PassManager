name: Build and Release PassManager

# Déclenché automatiquement quand un tag v* est poussé (ex: v1.0.0)
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write   # Nécessaire pour créer la release GitHub

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Build avec PyInstaller
        run: pyinstaller PassManager.spec

      - name: Extraire la version depuis le tag
        id: tag
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Créer le zip portable
        shell: pwsh
        run: |
          Compress-Archive -Path dist\PassManager `
            -DestinationPath "dist\PassManager-${{ steps.tag.outputs.version }}-portable.zip"

      - name: Installer Inno Setup
        run: choco install innosetup --yes

      - name: Compiler le setup Inno Setup
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\PassManager.iss

      - name: Publier la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: PassManager v${{ steps.tag.outputs.version }}
          body: |
            ## PassManager v${{ steps.tag.outputs.version }}

            ### Téléchargements
            - **PassManager-${{ steps.tag.outputs.version }}-Setup.exe** — Installation classique (Menu Démarrer, désinstalleur automatique)
            - **PassManager-${{ steps.tag.outputs.version }}-portable.zip** — Version portable, aucune installation requise

            ### Compatibilité
            Windows 10 / 11
          files: |
            installer/output/PassManager-${{ steps.tag.outputs.version }}-Setup.exe
            dist/PassManager-${{ steps.tag.outputs.version }}-portable.zip
